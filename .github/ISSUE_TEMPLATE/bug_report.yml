name: Bug Report
description: Report a bug in EverMemory
labels: [bug]
body:
  - type: textarea
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
  - type: input
    attributes:
      label: EverMemory version
      placeholder: e.g. 1.0.4
  - type: dropdown
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Windows
  - type: textarea
    attributes:
      label: Relevant logs
      description: Paste any relevant log output
      render: shell
