name: evermemory-ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Environment doctor
        run: npm run doctor

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit
